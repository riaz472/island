workflows:
  island-build:
    name: Build Island APK
    environment:
      java: 17
    scripts:
      - name: Setup Android SDK path
        script: |
          export ANDROID_SDK_ROOT=/usr/local/share/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Clone deagle library
        script: |
          git clone https://github.com/oasisfeng/deagle.git ../deagle
      - name: Build APK
        script: |
          export ANDROID_SDK_ROOT=/usr/local/share/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          ./gradlew :assembly:assembleCompleteRelease
    artifacts:
      - assembly/build/outputs/apk/complete/release/*.apk
